<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NVA Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <link rel="stylesheet" href="css/styles.css">
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>
</head>
<body>
    <div class="relative min-h-screen grain-overlay flex flex-col items-center justify-center px-4 py-8">
        
        <div class="fixed inset-0 overflow-hidden pointer-events-none">
            <div class="absolute inset-0 animate-gradient-flow" style="background: linear-gradient(135deg, rgba(67, 145, 234, 0.3) 0%, rgba(156, 109, 233, 0.3) 35%, rgba(237, 69, 131, 0.3) 65%, rgba(67, 145, 234, 0.3) 100%) 0% 0% / 400% 400%;"></div>
            <div class="absolute inset-0 animate-gradient-flow" style="background: linear-gradient(-45deg, rgba(237, 69, 131, 0.2) 0%, rgba(156, 109, 233, 0.25) 50%, rgba(67, 145, 234, 0.2) 100%) 0% 0% / 300% 300%; animation-duration: 25s; animation-direction: reverse;"></div>
            <div class="absolute inset-0" style="background: radial-gradient(at 30% 20%, rgba(67, 145, 234, 0.15) 0%, transparent 50%), radial-gradient(at 70% 80%, rgba(237, 69, 131, 0.15) 0%, transparent 50%);"></div>
            <div class="absolute top-1/4 left-1/4 w-[500px] h-[500px] animate-orb-1" style="background: radial-gradient(circle, rgba(67, 145, 234, 0.4) 0%, transparent 70%); filter: blur(60px);"></div>
            <div class="absolute top-1/2 right-1/4 w-[600px] h-[600px] animate-orb-2" style="background: radial-gradient(circle, rgba(156, 109, 233, 0.35) 0%, transparent 70%); filter: blur(80px);"></div>
            <div class="absolute bottom-1/4 left-1/3 w-[450px] h-[450px] animate-orb-3" style="background: radial-gradient(circle, rgba(237, 69, 131, 0.3) 0%, transparent 70%); filter: blur(70px);"></div>
            <div class="absolute inset-0 bg-white/60 dark:bg-[hsl(240,25%,3%)]/50 transition-colors duration-500"></div>
        </div>

        <div class="relative z-10 w-full max-w-md">
            <div class="cream-card rounded-2xl p-8 shadow-2xl animate-fade-in-up" style="box-shadow: 0 0 80px -20px hsl(var(--gradient-purple) / 0.15), 0 25px 50px -12px rgba(0,0,0,0.4);">
                
                <div class="flex flex-col items-center mb-6">
                    <div class="w-16 h-16 rounded-2xl gradient-bg flex items-center justify-center mb-4 cursor-pointer" onclick="window.location.href='index.html'" style="box-shadow: 0 0 30px hsl(var(--gradient-purple) / 0.4);">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="w-8 h-8 text-white"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"></path><path d="M20 3v4"></path><path d="M22 5h-4"></path><path d="M4 17v2"></path><path d="M5 18H3"></path></svg>
                    </div>
                    <h1 id="form-title" class="text-2xl font-bold text-foreground">Welcome Back</h1>
                    <p id="form-subtitle" class="text-muted-foreground text-center mt-2">Sign in to access your AI-generated websites</p>
                </div>

                <form id="auth-form" class="space-y-4 mb-4">
                    <div class="space-y-2">
                        <label class="text-sm font-medium" for="email">Email</label>
                        <div class="relative">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-muted-foreground"><rect width="20" height="16" x="2" y="4" rx="2"></rect><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path></svg>
                            <input type="email" id="email" required class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-base focus:outline-none focus:ring-2 focus:ring-ring pl-10" placeholder="you@example.com">
                        </div>
                    </div>
                    
                    <div class="space-y-2">
                        <div class="flex items-center justify-between">
                            <label class="text-sm font-medium" for="password">Password</label>
                            <button type="button" class="text-xs text-primary hover:underline">Forgot password?</button>
                        </div>
                        <div class="relative">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-muted-foreground"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                            <input type="password" id="password" required class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-base focus:outline-none focus:ring-2 focus:ring-ring pl-10 pr-10" placeholder="••••••••">
                            <button type="button" id="toggle-password" class="absolute right-3 top-1/2 -translate-y-1/2 text-muted-foreground hover:text-foreground">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            </button>
                        </div>
                    </div>

                    <button id="submit-btn" class="bg-blue-600 text-white hover:bg-blue-700 shadow-lg shadow-blue-500/30 px-4 py-2 w-full h-11 rounded-xl text-sm font-medium mt-4 transition-colors" type="submit">Sign In</button>
                </form>

                <p class="text-sm text-muted-foreground text-center mt-6">
                    <span id="toggle-mode-text">Don't have an account?</span> 
                    <button type="button" id="toggle-mode-btn" class="text-blue-500 hover:underline font-medium">Sign up</button>
                </p>
                
                <div id="notification" class="hidden mt-4 p-3 rounded-md text-sm text-center"></div>
            </div>
            
            <div class="mt-8 text-center">
                <p class="text-sm text-muted-foreground mb-4">Join our community & stay connected</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
