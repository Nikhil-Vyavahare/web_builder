<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NVA Workspace</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    
    <link rel="stylesheet" href="css/styles.css">

    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>
</head>
<body>
    <div class="relative min-h-screen grain-overlay">
        
        <div class="fixed inset-0 overflow-hidden pointer-events-none">
            <div class="absolute inset-0 animate-gradient-flow" style="background: linear-gradient(135deg, rgba(67, 145, 234, 0.3) 0%, rgba(156, 109, 233, 0.3) 35%, rgba(237, 69, 131, 0.3) 65%, rgba(67, 145, 234, 0.3) 100%) 0% 0% / 400% 400%;"></div>
            <div class="absolute inset-0 animate-gradient-flow" style="background: linear-gradient(-45deg, rgba(237, 69, 131, 0.2) 0%, rgba(156, 109, 233, 0.25) 50%, rgba(67, 145, 234, 0.2) 100%) 0% 0% / 300% 300%; animation-duration: 25s; animation-direction: reverse;"></div>
            <div class="absolute inset-0" style="background: radial-gradient(at 30% 20%, rgba(67, 145, 234, 0.15) 0%, transparent 50%), radial-gradient(at 70% 80%, rgba(237, 69, 131, 0.15) 0%, transparent 50%);"></div>
            <div class="absolute inset-0 bg-white/60 dark:bg-[hsl(240,25%,3%)]/50 transition-colors duration-500"></div>
        </div>

        <div class="relative z-10">
            <nav class="fixed top-0 left-0 right-0 z-40 nav-blur">
                <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 sm:py-4">
                    <div class="flex items-center justify-between">
                        
                        <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
                            <div class="w-8 h-8 sm:w-9 sm:h-9 rounded-xl gradient-bg flex items-center justify-center">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 sm:w-5 sm:h-5 text-white">
                                    <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"></path>
                                    <path d="M20 3v4"></path><path d="M22 5h-4"></path><path d="M4 17v2"></path><path d="M5 18H3"></path>
                                </svg>
                            </div>
                            <span class="text-lg sm:text-xl font-semibold text-foreground">NVA</span>
                        </div>

                        <div class="flex items-center gap-2 sm:gap-3">
                            <button id="theme-toggle" class="relative w-10 h-10 rounded-full flex items-center justify-center overflow-hidden group hover:scale-105 active:scale-95 transition-transform">
                                <div class="relative w-5 h-5">
                                    <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="absolute inset-0 w-5 h-5 text-amber-500 transition-all duration-500 ease-out opacity-100 rotate-0 scale-100"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path></svg>
                                    <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="absolute inset-0 w-5 h-5 text-indigo-400 transition-all duration-500 ease-out opacity-0 -rotate-90 scale-0"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>
                                </div>
                            </button>
                            
                            <div class="hidden sm:flex items-center gap-2 sm:gap-3">
                                <button class="inline-flex items-center justify-center h-9 rounded-md px-3 gap-2 hover:bg-muted">
                                    <div class="w-7 h-7 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 flex justify-center items-center text-white text-xs font-bold" id="user-avatar">U</div>
                                    <span class="text-sm font-medium text-foreground truncate max-w-[120px]" id="user-name">User</span>
                                </button>
                                <button id="logout-btn" class="w-8 h-8 rounded-md flex items-center justify-center text-muted-foreground hover:text-foreground hover:bg-muted" title="Sign out">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" x2="9" y1="12" y2="12"></line></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </nav>

            <div class="min-h-screen pt-16 sm:pt-24 pb-8 sm:pb-12 px-3 sm:px-6">
                <div class="max-w-7xl mx-auto">
                    
                    <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 sm:gap-4 mb-4 sm:mb-6">
                        <div class="flex items-center gap-3 w-full sm:w-auto">
                            <button onclick="window.location.href='index.html'" class="inline-flex items-center text-sm font-medium border bg-background hover:bg-muted h-10 px-4 py-2 gap-2 rounded-full border-border">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><path d="M5 12h14"></path><path d="M12 5v14"></path></svg>
                                <span>New Project</span>
                            </button>
                        </div>
                        
                        <div class="flex items-center gap-2 w-full sm:w-auto justify-end">
                            <button id="edit-lock-btn" class="w-9 h-9 flex justify-center items-center rounded-full hover:bg-muted text-foreground transition-colors" title="Toggle Edit Mode">
                                <svg id="lock-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                            </button>

                            <button id="edit-ai-btn" class="w-9 h-9 flex justify-center items-center rounded-full hover:bg-muted text-purple-500 transition-colors" title="Edit with AI">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path></svg>
                            </button>

                            <button id="save-btn" class="w-9 h-9 flex justify-center items-center rounded-full hover:bg-muted text-foreground" title="Save Changes">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                            </button>

                            <button id="copy-btn" class="w-9 h-9 flex justify-center items-center rounded-full hover:bg-muted text-foreground" title="Copy Code">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"></rect><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path></svg>
                            </button>

                            <button id="download-btn" class="w-9 h-9 flex justify-center items-center rounded-full hover:bg-muted text-foreground" title="Download HTML">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" x2="12" y1="15" y2="3"></line></svg>
                            </button>
                        </div>
                    </div>

                    <div class="grid gap-4 sm:gap-6 lg:grid-cols-2">
                        <div class="rounded-xl sm:rounded-2xl overflow-hidden bg-[hsl(222,47%,11%)] border border-white/10 shadow-lg">
                            <div class="px-4 py-3" style="background: linear-gradient(135deg, rgb(67, 145, 234) 0%, rgb(156, 109, 233) 100%);">
                                <h3 class="text-base font-semibold text-white flex items-center gap-2">
                                    <div class="flex gap-1.5"><div class="w-3 h-3 rounded-full bg-white/30"></div><div class="w-3 h-3 rounded-full bg-white/30"></div><div class="w-3 h-3 rounded-full bg-white/30"></div></div>
                                    <span class="ml-2">Code</span>
                                </h3>
                            </div>
                            <div class="p-0 h-[500px]">
                                <textarea id="code-editor" class="w-full h-full bg-transparent text-[hsl(210,40%,85%)] font-mono text-sm p-4 focus:outline-none resize-none transition-opacity" spellcheck="false" placeholder="Waiting for code..."></textarea>
                            </div>
                        </div>

                        <div class="rounded-xl sm:rounded-2xl overflow-hidden bg-white border border-gray-200 dark:border-white/10 shadow-lg">
                            <div class="px-4 py-3" style="background: linear-gradient(135deg, rgb(156, 109, 233) 0%, rgb(237, 69, 131) 100%);">
                                <h3 class="text-base font-semibold text-white flex items-center gap-2">
                                    <div class="flex gap-1.5"><div class="w-3 h-3 rounded-full bg-white/30"></div><div class="w-3 h-3 rounded-full bg-white/30"></div><div class="w-3 h-3 rounded-full bg-white/30"></div></div>
                                    <span class="ml-2">Preview</span>
                                </h3>
                            </div>
                            <div class="h-[500px] bg-white relative">
                                <iframe id="preview-frame" class="w-full h-full border-0" sandbox="allow-scripts allow-same-origin"></iframe>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="js/workspace.js"></script>
</body>
</html>
