<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NVA App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link rel="stylesheet" href="css/styles.css">
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>
</head>
<body>
    <div class="relative min-h-screen grain-overlay">
        <div class="fixed inset-0 overflow-hidden pointer-events-none">
            <div class="absolute inset-0 animate-gradient-flow" style="background: linear-gradient(135deg, rgba(67, 145, 234, 0.3) 0%, rgba(156, 109, 233, 0.3) 35%, rgba(237, 69, 131, 0.3) 65%, rgba(67, 145, 234, 0.3) 100%) 0% 0% / 400% 400%;"></div>
            <div class="absolute inset-0 animate-gradient-flow" style="background: linear-gradient(-45deg, rgba(237, 69, 131, 0.2) 0%, rgba(156, 109, 233, 0.25) 50%, rgba(67, 145, 234, 0.2) 100%) 0% 0% / 300% 300%; animation-duration: 25s; animation-direction: reverse;"></div>
            <div class="absolute inset-0" style="background: radial-gradient(at 30% 20%, rgba(67, 145, 234, 0.15) 0%, transparent 50%), radial-gradient(at 70% 80%, rgba(237, 69, 131, 0.15) 0%, transparent 50%);"></div>
            <div class="absolute inset-0 bg-white/60 dark:bg-black/60 transition-colors duration-500"></div>
        </div>

        <div class="relative z-10">
            <nav class="fixed top-0 left-0 right-0 z-40 nav-blur">
                <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                    <div class="flex items-center gap-2 cursor-pointer">
                        <div class="w-9 h-9 rounded-xl gradient-bg flex items-center justify-center">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 text-white"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"></path><path d="M20 3v4"></path><path d="M22 5h-4"></path><path d="M4 17v2"></path><path d="M5 18H3"></path></svg>
                        </div>
                        <span class="text-xl font-semibold text-foreground">NVA</span>
                    </div>

                    <div class="flex items-center gap-2 sm:gap-4">
                        <button id="theme-toggle" class="relative w-10 h-10 rounded-full flex items-center justify-center overflow-hidden group">
                            <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="absolute inset-0 w-5 h-5 text-amber-500 transition-all duration-500 ease-out m-auto"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path></svg>
                            <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="absolute inset-0 w-5 h-5 text-indigo-400 transition-all duration-500 ease-out opacity-0 -rotate-90 scale-0 m-auto"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>
                        </button>
                        
                        <div id="auth-buttons" class="flex items-center gap-2">
                            <button onclick="window.location.href='auth.html'" class="text-sm font-medium text-muted-foreground hover:text-foreground">Log in</button>
                            <button onclick="window.location.href='auth.html'" class="bg-foreground text-background hover:bg-foreground/90 text-sm font-medium px-4 py-2 rounded-full">Get started</button>
                        </div>

                        <div id="user-menu" class="hidden items-center gap-2">
                            <button class="inline-flex items-center justify-center h-9 rounded-md px-3 gap-2 hover:bg-muted">
                                <div class="w-7 h-7 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 flex justify-center items-center text-white text-xs font-bold" id="user-avatar">U</div>
                                <span class="text-sm font-medium text-foreground hidden sm:block truncate max-w-[100px]" id="user-name">User</span>
                            </button>
                            <button id="logout-btn" class="w-8 h-8 rounded-md flex items-center justify-center text-muted-foreground hover:text-foreground hover:bg-muted" title="Sign out">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" x2="9" y1="12" y2="12"></line></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </nav>

            <div class="min-h-screen flex flex-col items-center justify-center px-6 pt-24 pb-12">
                <div class="text-center mb-12 space-y-6">
                    <h1 class="text-5xl sm:text-6xl md:text-7xl font-bold text-foreground tracking-tight">Build something <span class="gradient-text">NVA</span></h1>
                    <p class="text-xl md:text-2xl text-muted-foreground max-w-xl mx-auto">Create apps and websites by chatting with AI</p>
                </div>

                <div class="w-full max-w-2xl mx-auto">
                    <div class="cream-card rounded-3xl overflow-hidden relative">
                        <div class="p-6 pb-3">
                            <div id="image-preview-container" class="hidden mb-3 relative inline-block group">
                                <img id="image-preview" class="h-20 w-20 object-cover rounded-lg border border-border shadow-sm" src="" alt="Preview">
                                <button id="remove-image-btn" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs opacity-0 group-hover:opacity-100 transition-opacity">✕</button>
                            </div>
                            <textarea id="prompt-input" placeholder="Ask NVA to create a landing page..." class="w-full min-h-[96px] max-h-[200px] resize-none bg-transparent text-foreground placeholder:text-muted-foreground text-base leading-relaxed focus:outline-none transition-colors duration-300"></textarea>
                        </div>
                        
                        <div class="px-4 pb-4 flex items-center justify-between border-t border-border/10 pt-3 mt-2">
                            <div class="flex items-center gap-1">
                                <input type="file" id="image-upload" accept="image/png, image/jpeg, image/webp" class="hidden">
                                <button id="attach-btn" class="input-toolbar-btn" aria-label="Attach Image" title="Attach Image" type="button"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg></button>
                            </div>
                            <div class="flex items-center gap-1">
                                <button id="mic-btn" class="input-toolbar-btn relative" aria-label="Voice Input" title="Voice Input" type="button"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" x2="12" y1="19" y2="22"></line></svg></button>
                                <button id="enhance-btn" class="input-toolbar-btn text-purple-500 hover:text-purple-400" title="Enhance Prompt"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path></svg></button>
                                <button id="generate-btn" disabled class="submit-btn ml-2" aria-label="Generate" type="button"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const themeToggleBtn = document.getElementById('theme-toggle');
            const sunIcon = document.getElementById('sun-icon');
            const moonIcon = document.getElementById('moon-icon');

            if (document.documentElement.classList.contains('dark')) {
                sunIcon.style.opacity = '0'; sunIcon.style.transform = 'rotate(-90deg) scale(0)';
                moonIcon.style.opacity = '1'; moonIcon.style.transform = 'rotate(0) scale(1)';
            }
            themeToggleBtn.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                const isDark = document.documentElement.classList.contains('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                sunIcon.style.opacity = isDark ? '0' : '1'; sunIcon.style.transform = isDark ? 'rotate(-90deg) scale(0)' : 'rotate(0) scale(1)';
                moonIcon.style.opacity = isDark ? '1' : '0'; moonIcon.style.transform = isDark ? 'rotate(0) scale(1)' : 'rotate(-90deg) scale(0)';
            });
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
